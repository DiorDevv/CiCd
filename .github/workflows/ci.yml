name: Python CI/CD Pipeline

# Qachon ishga tushadi?
on:
  push:
    branches: [ main ]        # main ga push qilinganda
  pull_request:
    branches: [ main ]        # PR ochilganda

jobs:

  # ===== 1-ISH: TESTLAR =====
  test:
    name: Testlarni ishlatish
    runs-on: ubuntu-latest    # Linux server ishlatadi

    # Bir nechta Python versiyasida tekshirish
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:

      # 1. Kodni yuklab oladi
      - name: Kodni olish
        uses: actions/checkout@v4

      # 2. Python o'rnatadi
      - name: Python ${{ matrix.python-version }} o'rnatish
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      # 3. Kerakli paketlarni o'rnatadi
      - name: Paketlarni o'rnatish
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      # 4. Testlarni ishlatadi
      - name: Pytest ishlatish
        run: |
          pytest test_calculator.py -v

  # ===== 2-ISH: DEPLOY (test o'tgandan keyin) =====
  deploy:
    name: Deploy qilish
    runs-on: ubuntu-latest
    needs: test               # Faqat test o'tsa ishlaydi!

    # Faqat main branchda deploy
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Kodni olish
        uses: actions/checkout@v4

      - name: Deploy xabari
        run: |
          echo "✅ Testlar o'tdi!"
          echo "🚀 Deploy muvaffaqiyatli!"
          echo "🌍 Ilova foydalanuvchilarga yetdi!"